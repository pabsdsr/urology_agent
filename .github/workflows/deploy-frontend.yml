# Production SPA build: Vite inlines import.meta.env at `npm run build` time.
# Required GitHub secrets (repository → Settings → Secrets and variables → Actions):
#   VITE_API_URL              — e.g. https://api.uroassist.net
#   VITE_APP_ORIGIN           — SPA origin (e.g. https://www.uroassist.net) for MSAL defaults
# Optional (override MSAL URLs; must match Entra app registration redirect URIs):
#   VITE_MSAL_REDIRECT_URI, VITE_MSAL_POST_LOGOUT_URI, VITE_ADMIN_APP_ROLE
#
# Backend env (AUTHORIZED_EMAILS, ENTRA_*, PRACTICE_*, etc.) is set on Elastic Beanstalk, not here.

name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Build and Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Create production environment file
        working-directory: ./client
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then
            echo "::error::Set repository secret VITE_API_URL (e.g. https://api.uroassist.net)"
            exit 1
          fi
          # Default SPA origin matches health-check URL below; override with VITE_APP_ORIGIN secret.
          ORIGIN="${{ secrets.VITE_APP_ORIGIN }}"
          {
            echo "VITE_API_URL=${{ secrets.VITE_API_URL }}"
            echo "VITE_APP_ORIGIN=${ORIGIN:-https://uroassist.net}"
          } > .env.production
          if [ -n "${{ secrets.VITE_MSAL_REDIRECT_URI }}" ]; then
            echo "VITE_MSAL_REDIRECT_URI=${{ secrets.VITE_MSAL_REDIRECT_URI }}" >> .env.production
          fi
          if [ -n "${{ secrets.VITE_MSAL_POST_LOGOUT_URI }}" ]; then
            echo "VITE_MSAL_POST_LOGOUT_URI=${{ secrets.VITE_MSAL_POST_LOGOUT_URI }}" >> .env.production
          fi
          if [ -n "${{ secrets.VITE_ADMIN_APP_ROLE }}" ]; then
            echo "VITE_ADMIN_APP_ROLE=${{ secrets.VITE_ADMIN_APP_ROLE }}" >> .env.production
          fi
          echo "Wrote .env.production (Vite build-time config)"

      - name: Build React app
        working-directory: ./client
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      
      - name: Sync files to S3 (except index.html)
        working-directory: ./client
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
      
      - name: Upload index.html with no-cache
        working-directory: ./client
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
      
      - name: Wait for CloudFront invalidation
        run: |
          echo "Waiting for CloudFront invalidation to complete..."
          INVALIDATION_ID=$(aws cloudfront list-invalidations \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'InvalidationList.Items[0].Id' \
            --output text)
          
          echo "Invalidation ID: $INVALIDATION_ID"
          
          # Wait for invalidation (with timeout fallback)
          timeout 300 aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id "$INVALIDATION_ID" || echo "Invalidation still in progress (continuing anyway)"
      
      - name: Verify deployment
        run: |
          echo "Testing frontend..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://uroassist.net)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Frontend deployment successful!"
          else
            echo "❌ Frontend returned status $HTTP_STATUS"
            exit 1
          fi
      
      - name: Deployment summary
        run: |
          echo "🚀 Frontend deployed successfully!"
          echo "📦 Bucket: ${{ secrets.S3_BUCKET }}"
          echo "🌐 URL: https://uroassist.net"
          echo "☁️ CloudFront: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Frontend deployment failed!"
          echo "Check the logs above for details."







