name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      
      - name: Verify AWS credentials
        run: |
          aws sts get-caller-identity
      
      - name: Deploy to Elastic Beanstalk
        working-directory: ./server
        run: |
          # Initialize EB (if not already initialized)
          if [ ! -d ".elasticbeanstalk" ]; then
            eb init ${{ secrets.EB_APPLICATION_NAME }} \
              --region ${{ secrets.AWS_DEFAULT_REGION }} \
              --platform docker
          fi
          
          # Deploy to production environment
          eb deploy ${{ secrets.EB_ENVIRONMENT_NAME }} --timeout 20
      
      - name: Wait for environment to be ready
        working-directory: ./server
        timeout-minutes: 5
        continue-on-error: true
        run: |
          echo "Checking environment health..."
          eb health ${{ secrets.EB_ENVIRONMENT_NAME }} || true
          echo "Environment status checked (deployment may still be in progress)"
      
      # ALB often returns 502 briefly while new tasks start or old connections drain.
      - name: Verify deployment
        run: |
          set -e
          url="https://api.uroassist.net/health"
          echo "Testing health endpoint with retries (up to ~3 min)..."
          for i in $(seq 1 18); do
            if curl -sfS --max-time 20 "$url" >/dev/null; then
              echo "✅ Backend deployment successful!"
              exit 0
            fi
            echo "Attempt $i/18: not healthy yet (502/timeouts are common right after deploy); waiting 10s..."
            sleep 10
          done
          echo "❌ Health check still failing after retries."
          echo "Check EB: eb health, eb logs, and container stdout (app crash / missing env on startup)."
          exit 1
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Backend deployment failed!"
          echo "Check the logs above for details."







